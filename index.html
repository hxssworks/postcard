<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postcards from Beyond · 乌尤尼</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=DM+Sans:wght@300;400;500&family=Noto+Serif+SC:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1612; --paper: #f5f0e8; --paper2: #ede8dc;
  --gold: #c8963c; --gold-light: #e8c47a; --muted: #7a7268; --accent: #2d4a3e;
}
html { background: #f0ebe0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f0ebe0; color: var(--ink);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 36px 20px 80px;
}
.masthead { text-align: center; margin-bottom: 28px; animation: fadeUp 0.5s ease both; }
.masthead-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.35em; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
.masthead-title { font-family: 'Playfair Display', serif; font-size: clamp(32px,5vw,52px); font-weight: 700; color: var(--ink); line-height: 1.05; letter-spacing: -0.02em; }
.masthead-title em { font-style: italic; color: var(--gold); }
.masthead-rule { width: 40px; height: 1px; background: var(--gold); margin: 14px auto 0; opacity: 0.5; }
.card-wrapper { width: 100%; max-width: 480px; animation: fadeUp 0.7s ease both; }
.card { background: var(--paper); border-radius: 2px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 16px 40px rgba(0,0,0,0.12), 0 0 0 1px rgba(200,150,60,0.2); }
.photo-wrap { position: relative; height: 420px; overflow: hidden; background: #1a1612; }
.photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 8s ease; transform: scale(1.04); }
.card:hover .photo-wrap img { transform: scale(1.0); }
.photo-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(15,10,5,0.55) 70%, rgba(15,10,5,0.82) 100%); }
.photo-badge { position: absolute; top: 18px; left: 18px; background: rgba(15,10,5,0.6); backdrop-filter: blur(6px); border: 0.5px solid rgba(200,150,60,0.4); border-radius: 2px; padding: 5px 10px; font-size: 9.5px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold-light); }
.day-badge { position: absolute; top: 18px; right: 18px; background: var(--gold); border-radius: 2px; padding: 4px 10px; font-family: 'Playfair Display', serif; font-size: 11px; font-weight: 700; color: var(--ink); }
.photo-location { position: absolute; bottom: 20px; left: 20px; right: 20px; }
.location-country { font-size: 10px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 4px; }
.location-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #fff; line-height: 1.1; text-shadow: 0 2px 12px rgba(0,0,0,0.5); }
.card-body { padding: 24px 24px 20px; position: relative; }
.card-body::before { content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 0.5px; background: linear-gradient(to right, var(--gold), transparent); opacity: 0.4; }
.story-label { font-size: 8.5px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
.story-text { font-family: 'Noto Serif SC', serif; font-size: 14.5px; line-height: 1.85; color: #3a3228; }
.story-text em { font-style: italic; color: var(--accent); }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
.tag { font-size: 10px; letter-spacing: 0.1em; color: var(--muted); background: var(--paper2); border: 0.5px solid #c8b89a; border-radius: 1px; padding: 3px 8px; }
.card-footer { padding: 14px 24px 18px; background: var(--paper2); display: flex; align-items: center; justify-content: space-between; border-top: 0.5px solid #c8b89a; }
.footer-credit { font-size: 10.5px; color: var(--muted); }
.footer-credit strong { font-weight: 500; color: #5a5044; }
.footer-brand { text-align: right; }
.brand-cn { font-family: 'Playfair Display', serif; font-size: 14px; font-style: italic; font-weight: 700; color: var(--gold); }
.brand-en { font-size: 9.5px; color: var(--muted); margin-top: 2px; letter-spacing: 0.06em; }
.action-row { display: flex; justify-content: flex-end; gap: 14px; margin-top: 16px; }
.action-btn { background: none; border: none; cursor: pointer; -webkit-appearance: none; appearance: none; font-size: 18px; color: var(--muted); transition: color 0.2s, transform 0.15s; padding: 0; line-height: 1; }
.action-btn:hover { color: var(--gold); transform: scale(1.15); }
.sound-btn {
  position: fixed; bottom: 22px; right: 22px;
  width: 31px; height: 31px; border-radius: 50%;
  background: var(--paper); border: 0.5px solid #c8b89a;
  box-shadow: 0 1px 6px rgba(0,0,0,0.1);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; z-index: 10; padding: 0;
}
.sound-btn:hover { border-color: var(--gold); transform: scale(1.1); }
.sound-btn:hover svg { stroke: var(--gold); }
.sound-btn.playing svg { stroke: var(--gold); }
.sound-btn svg { stroke: var(--muted); transition: stroke 0.2s; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

function updateLikeUI() {

      btn.appendChild(countEl);

function toggleLike() {
  var alreadyLiked = !!localStorage.getItem(storageKey);
  liked = !liked;
  if (liked && !alreadyLiked) {
    likeCount += 1;
    localStorage.setItem(storageKey, '1');
    fetch(SUPABASE_URL + '/rest/v1/likes', {

      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=ignore-duplicates' },

        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ count: likeCount })
      });
    }).then(function() {
      return fetch(SUPABASE_URL + '/rest/v1/likes?card_id=eq.' + CARD_ID + '&date=eq.' + TODAY + '&select=count', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
    }).then(function(r){ return r.json(); })
    .then(function(data){ if(data&&data[0]){ likeCount=data[0].count; updateLikeUI(); } })
    .catch(function(){});
  } else if (!liked && alreadyLiked) {
    likeCount = Math.max(0, likeCount - 1);
    localStorage.removeItem(storageKey);
    fetch(SUPABASE_URL + '/rest/v1/likes?card_id=eq.' + CARD_ID + '&date=eq.' + TODAY, {

}

/* 视差 */
var cardEl = document.querySelector('.card-wrapper');
cardEl.addEventListener('animationend', function() {
  cardEl.style.animation = 'none';
  cardEl.style.opacity = '1';
  cardEl.style.transform = 'none';
  bindParallax();
}, { once: true });
setTimeout(function() { if (!cardEl._parallaxBound) bindParallax(); }, 900);
function bindParallax() {
  if (cardEl._parallaxBound) return;
  cardEl._parallaxBound = true;
  cardEl.addEventListener('mousemove', function(e) {
    var rect = cardEl.getBoundingClientRect();
    var dx = ((e.clientX - rect.left) / rect.width  - 0.5) * 2;
    var dy = ((e.clientY - rect.top)  / rect.height - 0.5) * 2;
    var rx = dy * 0.33, ry = -dx * 0.15;
    cardEl.style.transform = 'perspective(900px) rotateX('+rx+'deg) rotateY('+ry+'deg) scale(1.008)';
    cardEl.style.transition = 'transform 0.08s ease-out';
    var px = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1);
    var py = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1);
    cardEl.querySelector('.card').style.setProperty('--gx', px + '%');
    cardEl.querySelector('.card').style.setProperty('--gy', py + '%');
  });
  cardEl.addEventListener('mouseleave', function() {
    cardEl.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) scale(1)';
    cardEl.style.transition = 'transform 0.6s ease-out';
  });
}

/* 光泽 */
var gs = document.createElement('style');
gs.textContent = '.card { --gx:50%; --gy:40%; } .card::after { content:""; position:absolute; inset:0; pointer-events:none; background: radial-gradient(circle at var(--gx) var(--gy), rgba(255,248,220,0.10) 0%, transparent 55%); transition: background 0.06s; }';
document.head.appendChild(gs);

/* 粒子 */
var fc = document.createElement('canvas');
fc.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;';
document.body.insertBefore(fc, document.body.firstChild);
var pctx = fc.getContext('2d');
var PW, PH2, particles = [];
function presizeCanvas() { PW = fc.width = window.innerWidth; PH2 = fc.height = window.innerHeight; }
window.addEventListener('resize', presizeCanvas); presizeCanvas();
function Particle(initial) { this.reset(initial); }
Particle.prototype.reset = function(initial) {
  this.x = Math.random() * PW;
  this.y = initial ? Math.random() * PH2 : -8;
  this.r = Math.random() * 1.2 + 0.3;
  this.vx = (Math.random() - 0.5) * 0.18;
  this.vy = Math.random() * 0.4 + 0.12;
  this.alpha = 0; this.maxAlpha = Math.random() * 0.28 + 0.06;
  this.life = 0; this.maxLife = Math.random() * 400 + 300;
  this.phase = Math.random() * Math.PI * 2;
  var grays = ['55,52,50', '80,76,72', '110,105,100'];
  this.color = grays[Math.floor(Math.random()*grays.length)];
};
Particle.prototype.update = function() {
  this.x += this.vx + Math.sin(this.life * 0.012 + this.phase) * 0.22;
  this.y += this.vy; this.life++;
  var t = this.life / this.maxLife;
  this.alpha = t < 0.15 ? (t/0.15)*this.maxAlpha : t > 0.8 ? ((1-t)/0.2)*this.maxAlpha : this.maxAlpha;
  this.alpha = Math.max(0, this.alpha);
  if (this.life >= this.maxLife || this.y > PH2 + 10) this.reset(false);
};
Particle.prototype.draw = function() {
  pctx.save(); pctx.globalAlpha = this.alpha;
  pctx.fillStyle = 'rgba('+this.color+',1)';
  pctx.beginPath();
  pctx.ellipse(this.x,this.y,this.r,this.r*0.65,this.life*0.01,0,Math.PI*2);
  pctx.fill(); pctx.restore();
};
for (var pi=0; pi<60; pi++) particles.push(new Particle(true));
function animateParticles() {
  pctx.clearRect(0,0,PW,PH2);
  for (var i=0;i<particles.length;i++) { particles[i].update(); particles[i].draw(); }
  requestAnimationFrame(animateParticles);
}
animateParticles();

/* Canvas 下载 */
function downloadCard() {
  document.fonts.ready.then(function() {
    Promise.all([
      document.fonts.load('700 40px "Playfair Display"'),
      document.fonts.load('italic 700 40px "Playfair Display"'),
      document.fonts.load('400 40px "Noto Serif SC"'),
      document.fonts.load('500 40px "DM Sans"')
    ]).then(function() {
      var imgEl = document.querySelector('.photo-wrap img');
      var photo = new Image();
      photo.crossOrigin = 'anonymous';
      photo.onload = function() { doCanvas(photo); };
      photo.onerror = function() { doCanvas(null); };
      photo.src = imgEl.src;
    });
  });
}
function wrapText(ctx, text, x, y, maxW, lineH) {
  var words=text.split(''), line='', ly=y;
  for(var n=0;n<words.length;n++){
    var testLine=line+words[n];
    if(ctx.measureText(testLine).width>maxW&&line!==''){
      ctx.fillText(line,x,ly); line=words[n]; ly+=lineH;
    } else { line=testLine; }
  }
  ctx.fillText(line,x,ly);
  return ly;
}
function rrPath(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }
function rrFill(ctx,x,y,w,h,r,color){ rrPath(ctx,x,y,w,h,r); ctx.fillStyle=color; ctx.fill(); }
function doCanvas(photo) {
  var FS='"Noto Serif SC","PingFang SC","Microsoft YaHei",serif';
  var FN='"DM Sans","PingFang SC","Microsoft YaHei",sans-serif';
  var FD='"Playfair Display",Georgia,serif';
  var PAPER='#f5f0e8',PAPER2='#ede8dc',INK='#1a1612';
  var GOLD='#c8963c',MUTED='#7a7268';
  var W=1080,CX=72,CW=W-144,PH=660,PAD=32;
  var story = document.querySelector('.story-text').innerText;
  var tags  = Array.from(document.querySelectorAll('.tag')).map(function(t){ return t.textContent; });
  var tmp=document.createElement('canvas'); tmp.width=W; tmp.height=3000;
  var t=tmp.getContext('2d'); var ty0=PH+54;
  t.font='500 19px '+FN; ty0+=50;
  t.font='400 33px '+FS;
  ty0=wrapText(t,story,CX+PAD,ty0,CW-PAD*2,56)+30;
  t.font='400 21px '+FN; var tx0=CX+PAD;
  for(var i=0;i<tags.length;i++){ var tw0=t.measureText(tags[i]).width+26; if(tx0+tw0>CX+CW-PAD){tx0=CX+PAD;ty0+=44;} tx0+=tw0+10; }
  ty0+=52;
  var CARD_H=ty0+100, CY=160, H=Math.max(1080,Math.min(1920,CY+CARD_H+120));
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var c=cv.getContext('2d');
  c.fillStyle='#f0ebe0'; c.fillRect(0,0,W,H);
  c.fillStyle='rgba(0,0,0,0.06)'; c.fillRect(CX+8,CY+8,CW,CARD_H);
  rrFill(c,CX,CY,CW,CARD_H,4,PAPER);
  c.save(); c.beginPath(); rrPath(c,CX,CY,CW,PH,4); c.clip();
  if(photo){
    var ir=photo.width/photo.height,cr=CW/PH,sx,sy,sw,sh;
    if(ir>cr){sh=photo.height;sw=sh*cr;sx=(photo.width-sw)/2;sy=0;}
    else{sw=photo.width;sh=sw/cr;sx=0;sy=(photo.height-sh)/2;}
    c.drawImage(photo,sx,sy,sw,sh,CX,CY,CW,PH);
  }
  var ov=c.createLinearGradient(0,CY+PH*0.4,0,CY+PH);
  ov.addColorStop(0,'rgba(15,10,5,0)'); ov.addColorStop(0.5,'rgba(15,10,5,0.55)'); ov.addColorStop(1,'rgba(15,10,5,0.82)');
  c.fillStyle=ov; c.fillRect(CX,CY,CW,PH);
  c.restore();
  /* badges */
  c.fillStyle='rgba(15,10,5,0.6)';
  rrFill(c,CX+18,CY+18,170,38,2,c.fillStyle);
  c.font='500 18px '+FN; c.fillStyle='#e8c47a'; c.letterSpacing='4px';
  c.fillText('South America · 南美洲',CX+32,CY+43); c.letterSpacing='0px';
  rrFill(c,CX+CW-120,CY+18,90,34,2,GOLD);
  c.font='bold 20px '+FD; c.fillStyle=INK; c.fillText('003',CX+CW-93,CY+41);
  /* location */
  c.font='500 19px '+FN; c.fillStyle='#e8c47a'; c.letterSpacing='4px';
  c.fillText('BOLIVIA · 玻利维亚',CX+20,CY+PH-80); c.letterSpacing='0px';
  c.font='bold 52px '+FD; c.fillStyle='#ffffff';
  c.shadowColor='rgba(0,0,0,0.5)'; c.shadowBlur=12;
  c.fillText('乌尤尼盐沼',CX+20,CY+PH-36);
  c.shadowBlur=0;
  /* body */
  var by=CY+PH+56;
  c.fillStyle=GOLD; c.fillRect(CX+PAD,CY+PH,CW-PAD*2,0.5);
  c.font='500 17px '+FN; c.fillStyle=GOLD; c.letterSpacing='5px';
  c.fillText("TODAY'S STORY",CX+PAD,by); c.letterSpacing='0px';
  by+=38;
  c.font='400 33px '+FS; c.fillStyle=INK;
  by=wrapText(c,story,CX+PAD,by,CW-PAD*2,56)+30;
  /* tags */
  var tx=CX+PAD;
  for(var i=0;i<tags.length;i++){
    c.font='400 20px '+FN; c.fillStyle=MUTED; c.letterSpacing='1.5px';
    var tw=c.measureText(tags[i]).width+28;
    if(tx+tw>CX+CW-PAD){ tx=CX+PAD; by+=44; }
    rrFill(c,tx,by-22,tw,34,1,PAPER2);
    c.strokeStyle='#c8b89a'; c.lineWidth=0.5;
    rrPath(c,tx,by-22,tw,34,1); c.stroke();
    c.fillText(tags[i],tx+14,by+4);
    tx+=tw+10; c.letterSpacing='0px';
  }
  by+=52;
  /* footer */
  c.fillStyle=PAPER2; c.fillRect(CX,by,CW,84);
  c.strokeStyle='#c8b89a'; c.lineWidth=0.5;
  c.beginPath(); c.moveTo(CX,by); c.lineTo(CX+CW,by); c.stroke();
  c.font='500 20px '+FN; c.fillStyle=MUTED;
  c.fillText('📷  @ecoracy045',CX+PAD,by+32);
  c.font='400 18px '+FN; c.fillText('2026年5月15日',CX+PAD,by+57);
  c.font='italic bold 26px '+FD; c.fillStyle=GOLD;
  c.textAlign='right'; c.fillText('予心先行',CX+CW-PAD,by+32);
  c.font='400 18px '+FN; c.fillStyle=MUTED;
  c.fillText('Postcards from Beyond',CX+CW-PAD,by+57);
  c.textAlign='left';
  /* brand */
  c.font='italic bold 36px '+FD; c.fillStyle=GOLD;
  c.textAlign='center'; c.fillText('Postcards from Beyond',W/2,CY-60);
  c.font='500 18px '+FN; c.fillStyle=GOLD; c.letterSpacing='6px';
  c.fillText('E  &  M',W/2,CY-90); c.letterSpacing='0px';
  c.textAlign='left';
  var a=document.createElement('a');
  a.download='postcard_003_uyuni.png'; a.href=cv.toDataURL('image/png',0.95); a.click();
}
</script>
